# ═══════════════════════════════════════════════════════
# Netlify Deployment Configuration
# HNBC Software Solutions Pvt Ltd
# ═══════════════════════════════════════════════════════

[build]
  publish = "."
  command = "echo 'Static site — no build step required'"

# Redirect www to non-www (or vice versa)
[[redirects]]
  from = "http://hnbcsoftware.com/*"
  to = "https://www.hnbcsoftware.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://hnbcsoftware.com/*"
  to = "https://www.hnbcsoftware.com/:splat"
  status = 301
  force = true

# API proxy to backend (if using Netlify Functions or external API)
[[redirects]]
  from = "/api/*"
  to = "https://api.hnbcsoftware.com/api/:splat"
  status = 200
  force = true

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://www.google.com https://www.gstatic.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.hnbcsoftware.com; frame-src https://www.google.com https://maps.google.com;"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
