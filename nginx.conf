# ═══════════════════════════════════════════════════════
# HNBC Software Solutions — Nginx Configuration
# Place this file at: /etc/nginx/sites-available/hnbcsoftware.com
# Then: sudo ln -s /etc/nginx/sites-available/hnbcsoftware.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hnbcsoftware.com www.hnbcsoftware.com;
    return 301 https://www.hnbcsoftware.com$request_uri;
}

# Redirect non-www → www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hnbcsoftware.com;

    ssl_certificate     /etc/letsencrypt/live/hnbcsoftware.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hnbcsoftware.com/privkey.pem;

    return 301 https://www.hnbcsoftware.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hnbcsoftware.com;

    # SSL Configuration
    ssl_certificate     /etc/letsencrypt/live/hnbcsoftware.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hnbcsoftware.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Document Root (static frontend)
    root /var/www/hnbcsoftware.com;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://www.google.com https://www.gstatic.com https://maps.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src https://www.google.com https://maps.google.com;" always;

    # Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # API Proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Rate limiting for API
        limit_req zone=api burst=10 nodelay;
    }

    # Block sensitive files
    location ~* \.(env|json|md|txt|log|sh|bak)$ {
        deny all;
        return 404;
    }

    # Serve sitemap and robots
    location = /sitemap.xml {
        add_header Content-Type application/xml;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
    }

    # SPA / clean URLs fallback
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

# Rate limit zone definition (add to nginx.conf http block)
# limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
